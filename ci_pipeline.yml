name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install-dependencies:
    name: Install dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .  # if your project is installable as a package

  code-style:
    name: Code Style (flake8)
    runs-on: ubuntu-latest
    timeout-minutes: 4
    needs: [install-dependencies]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
      - name: Run flake8
        run: flake8 . --max-line-length=88 --extend-ignore=E203

  mypy-checks:
    name: Type checks (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 4
    needs: [install-dependencies]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
      - name: Run mypy
        run: mypy . --ignore-missing-imports

  unittests:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 7
    needs: [install-dependencies]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
      - name: Run pytest
        run: pytest tests/ --maxfail=1 --disable-warnings -v

  start:
    name: Run start script
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: [install-dependencies]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
      - name: Run example_usage.py
        run: python example_usage.py