<!DOCTYPE html>
<html lang="ru" class="h-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cover</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        body {
            display: flex;
            flex-direction: column;
            background-color: #1a1e24;
            color: #fff;
        }
        .cover-container {
            max-width: 42em;
            width: 100%;
            margin: auto;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .nav-masthead .nav-link {
            color: rgba(255,255,255,.6);
            border-bottom: 0.15rem solid transparent;
            padding: 0.25rem 0;
            margin-left: 1rem;
            font-weight: 500;
            text-decoration: none;
            transition: border-color 0.2s;
        }
        .nav-masthead .nav-link:hover {
            color: rgba(255,255,255,.6);
            border-bottom-color: rgba(255,255,255,.6);
        }
        .nav-masthead .active {
            color: #fff;
            border-bottom-color: #fff;
        }
        .btn-light {
            background-color: #fff;
            color: #1a1e24;
            border: none;
            padding: 0.75rem 2rem;
            font-weight: 600;
        }
        .btn-light:hover {
            background-color: #f0f0f0;
        }
        footer a {
            color: #fff;
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
        .lead {
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body class="text-center">
    <p></p>
    <div class="cover-container">
        <header class="mb-auto">
            <div>
                <h3 class="float-md-start mb-0">Cover</h3>
                <nav class="nav nav-masthead justify-content-center float-md-end">
                    <a class="nav-link active" aria-current="page" href="#">Home</a>
                    <a class="nav-link" href="#">Features</a>
                    <a class="nav-link" href="#">Contact</a>
                </nav>
            </div>
        </header>

        <main class="px-3">
            <h1 class="display-5 fw-normal">Cover your page.</h1>
            <p class="lead">Cover is a one-page template for building simple and beautiful home pages.</p>
            <p class="lead">Download, edit the text, and add your own fullscreen background photo to make it your own.</p>
            <p class="lead">
                <a href="#" class="btn btn-lg btn-light">Learn more</a>
            </p>
        </main>

        <footer class="mt-auto text-white-50">
            <p>Cover template for <a href="https://getbootstrap.com/" target="_blank">Bootstrap</a> by <a href="https://twitter.com/mdo" target="_blank">@mdo</a>.</p>
        </footer>
    </div>
    <p></p>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
